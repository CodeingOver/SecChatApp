<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecChatApp – Secure Chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
      <div class="auth-container">
        <div class="auth-logo">
          <div class="logo-icon">💬</div>
          <h1>SecChatApp</h1>
          <p>End-to-End Encrypted Messaging</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="register">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="auth-form">
          <div class="form-group">
            <input
              type="text"
              id="login-username"
              placeholder="Username"
              maxlength="20"
              autocomplete="username"
            />
          </div>
          <div class="form-group password-group">
            <input
              type="password"
              id="login-password"
              placeholder="Password"
              autocomplete="current-password"
            />
            <button
              class="toggle-password"
              type="button"
              data-target="login-password"
            >
              👁
            </button>
          </div>
          <div id="login-error" class="form-error hidden"></div>
          <button id="login-btn" class="btn-primary">Sign In</button>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="auth-form hidden">
          <div class="form-group">
            <input
              type="text"
              id="reg-username"
              placeholder="Username (3–20 characters)"
              maxlength="20"
              autocomplete="username"
            />
          </div>
          <div class="form-group password-group">
            <input
              type="password"
              id="reg-password"
              placeholder="Password (min 6 characters)"
              autocomplete="new-password"
            />
            <button
              class="toggle-password"
              type="button"
              data-target="reg-password"
            >
              👁
            </button>
          </div>
          <div class="form-group password-group">
            <input
              type="password"
              id="reg-confirm"
              placeholder="Confirm Password"
              autocomplete="new-password"
            />
            <button
              class="toggle-password"
              type="button"
              data-target="reg-confirm"
            >
              👁
            </button>
          </div>
          <div id="reg-error" class="form-error hidden"></div>
          <button id="reg-btn" class="btn-primary">Create Account</button>
        </div>

        <div class="auth-footer">
          <span class="security-note"
            >🔐 All messages are end-to-end encrypted</span
          >
        </div>
      </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen" class="screen hidden">
      <!-- Sidebar -->
      <div id="sidebar">
        <div id="sidebar-header">
          <div class="sidebar-logo">💬 SecChatApp</div>
          <div class="header-actions">
            <button
              id="friend-requests-btn"
              class="icon-btn"
              title="Friend requests"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="currentColor"
              >
                <path
                  d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                />
              </svg>
              <span id="fr-badge" class="fr-badge hidden">0</span>
            </button>
            <div class="my-avatar" id="my-avatar"></div>
            <button id="logout-btn" title="Sign out">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="currentColor"
              >
                <path
                  d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
                />
              </svg>
            </button>
          </div>
        </div>

        <!-- Sidebar Tabs -->
        <div class="sidebar-tabs">
          <button class="sidebar-tab active" data-stab="chats">Chats</button>
          <button class="sidebar-tab" data-stab="search">Search</button>
        </div>

        <!-- Chats Tab (Friends list) -->
        <div id="tab-chats" class="sidebar-tab-content">
          <div id="friends-list"></div>
        </div>

        <!-- Search Tab -->
        <div id="tab-search" class="sidebar-tab-content hidden">
          <div class="sidebar-search">
            <input
              type="text"
              id="search-input"
              placeholder="🔍  Search users by name..."
            />
          </div>
          <div id="search-results"></div>
        </div>

        <!-- Friend Requests Panel (overlay) -->
        <div id="friend-requests-panel" class="hidden">
          <div class="fr-panel-header">
            <h3>Friend Requests</h3>
            <button id="fr-close-btn" class="icon-btn">✕</button>
          </div>
          <div id="fr-list"></div>
        </div>
      </div>

      <!-- Chat Area -->
      <div id="chat-area">
        <!-- Empty state -->
        <div id="chat-empty" class="chat-empty">
          <div class="empty-icon">💬</div>
          <h2>Your Messages</h2>
          <p>Select a contact to start an encrypted conversation.</p>
          <span class="security-label">🔐 All messages are E2E encrypted</span>
        </div>

        <!-- Active chat -->
        <div id="chat-active" class="hidden">
          <div id="chat-header">
            <div class="chat-header-user">
              <div class="avatar" id="chat-avatar"></div>
              <div class="chat-header-info">
                <div id="chat-with" class="chat-username"></div>
                <div class="chat-status">🔐 End-to-end encrypted</div>
              </div>
            </div>
            <div class="chat-header-actions">
              <button
                id="add-friend-header-btn"
                class="btn-small btn-add-friend hidden"
              >
                👤 Kết bạn
              </button>
              <span id="encryption-badge" class="badge">E2E Encrypted</span>
            </div>
          </div>
          <div id="messages"></div>
          <div id="message-input-area">
            <button class="input-action-btn" type="button" title="Emoji">
              😊
            </button>
            <input
              type="text"
              id="message-input"
              placeholder="Aa"
              autocomplete="off"
            />
            <button id="send-btn" title="Send">
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                fill="currentColor"
              >
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="crypto.js"></script>
    <script src="app.js"></script>
  </body>
</html>
